<!DOCTYPE html>
<html lang="pt-br">
<head>
    <title>Painel Admin - Loja Story</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #222; color: #fff; }
        table { width: 100%; border-collapse: collapse; background: #333; }
        th, td { border: 1px solid #444; padding: 12px; text-align: left; }
        th { background: #444; }
    </style>
</head>
<body>
    <h1>📦 Pedidos Recebidos</h1>
    <table id="tabela-pedidos">
        <thead>
            <tr>
                <th>ID</th>
                <th>Cliente</th>
                <th>Total</th>
                <th>Data</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>

    <script>
        fetch('/api/admin/pedidos')
            .then(res => res.json())
            .then(pedidos => {
                const tbody = document.querySelector('#tabela-pedidos tbody');
                tbody.innerHTML = pedidos.map(p => `
                    <tr>
                        <td>#${p.id}</td>
                        <td>${p.cliente}</td>
                        <td>R$ ${p.total.toFixed(2)}</td>
                        <td>${p.data}</td>
                    </tr>
                `).join('');
            });
    </script>
</body>
</html>
